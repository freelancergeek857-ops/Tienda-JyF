<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificador Tienda JyF - Fix</title>
    <style>
        body { font-family: sans-serif; background: #eceff1; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3483fa; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #resultado { margin-top: 25px; display: none; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .error-msg { color: #c62828; font-size: 0.8em; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Verificador Tienda JyF</h2>
    <p>Si da error de conexión, intenta de nuevo o verifica el link.</p>
    <input type="text" id="urlInput" placeholder="Pega el link de ML aquí...">
    <button onclick="consultarML()">Analizar Publicación</button>
    <p id="errorLog" class="error-msg"></p>

    <div id="resultado">
        <img id="prodImg" src="" alt="Producto" style="max-width: 100px; display: block; margin: 0 auto 10px;">
        <div id="prodTitulo" style="font-weight: bold; margin-bottom: 10px;"></div>
        <div>Precio: $<span id="prodPrecio"></span></div>
        <div>Estado: <span id="prodEstado"></span></div>
    </div>
</div>

<script>
async function consultarML() {
    const input = document.getElementById('urlInput').value.trim();
    const log = document.getElementById('errorLog');
    const resDiv = document.getElementById('resultado');
    
    log.style.display = 'none';
    resDiv.style.display = 'none';

    const regex = /(?:MLA-?|wid=MLA)(\d+)/i;
    const match = input.match(regex);
    
    if (!match) {
        alert("Link no reconocido.");
        return;
    }

    const itemId = `MLA${match[1] || match[2]}`;

    try {
        // Intentamos la petición directa
        const response = await fetch(`https://api.mercadolibre.com/items/${itemId}`);
        
        if (!response.ok) throw new Error("Error en respuesta de API");

        const data = await response.json();

        resDiv.style.display = 'block';
        document.getElementById('prodTitulo').innerText = data.title;
        document.getElementById('prodPrecio').innerText = data.price.toLocaleString('es-AR');
        document.getElementById('prodImg').src = data.thumbnail;
        document.getElementById('prodEstado').innerText = data.status === 'active' ? 'ACTIVO' : 'INACTIVO';

    } catch (error) {
        console.error(error);
        log.innerText = "Error de conexión. Esto pasa si el navegador bloquea la petición (CORS) o el ID es de catálogo complejo.";
        log.style.display = 'block';
        
        // TRUCO FINAL: Si falla, te damos el link directo para que veas que el ID es correcto
        const backupLink = `https://api.mercadolibre.com/items/${itemId}`;
        log.innerHTML += `<br><br>Copia y pega esto en tu navegador para ver los datos crudos:<br><a href="${backupLink}" target="_blank">${backupLink}</a>`;
    }
}
</script>
</body>
</html>
