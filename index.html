<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda JyF - (en desarrollo...)</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body onload="revelarCuerpo()">

    <div id="pantalla-carga">
        <img id="img-homenaje" 
             src="img/Tienda_JyF.intro.webp" 
             class="w-[80%] md:w-[40%] h-auto rounded-[15px] overflow-hidden"
             alt="Homenaje Tienda JyF">
    </div>

    <div id="seccion-login" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center seccion">
        <div class="mb-8">
            <h2 class="text-5xl font-bold text-white mb-2">Bienvenido</h2>
            <p class="text-xl text-slate-400">Tu puerta de acceso a los Pesos JyF</p>
        </div>
        
        <button onclick="simularIngreso(event)" class="flex items-center gap-4 bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-sky-100 transition-all shadow-xl hover:scale-105">
            <img src="https://www.google.com/favicon.ico" class="w-6" alt="G">
            Ingresar con Google
        </button>
        <p class="mt-6 text-slate-600 text-sm">🔒 Conexión segura y encriptada</p>
    </div>

    <div id="seccion-catalogo" class="hidden p-8 seccion">
        <div class="fixed top-4 right-4 bg-sky-600 px-4 py-2 rounded-full font-bold shadow-2xl z-50 border border-sky-400">
            💰 Pesos JyF: <span id="saldo">0</span>
        </div>
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-sky-400">Tienda JyF</h1>
            <p class="text-slate-400">Comprá lo que te encanta 🤩 • Ganá Pesos JyF 💸 • Llevatelo todo 🎁</p>
        </header>
        <div id="grilla" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
