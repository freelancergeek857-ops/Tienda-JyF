<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda JyF - Versión Alpha</title>
    <!-- CDNs Estáticos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="revelarCuerpo()">

    <!-- Pantalla de Carga -->
    <div id="pantalla-carga">
        <img id="img-homenaje" src="img/Tienda_JyF.intro.webp" class="w-[80%] md:w-[40%] h-auto rounded-[15px] shadow-2xl" alt="Intro">
    </div>
	
	<!-- Sección Login -->
	<div id="seccion-login" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center" style="opacity: 0; transition: opacity 0.5s ease;">
        <div class="mb-8">
            <h2 class="text-5xl font-bold text-white mb-2 tracking-tight">Tienda JyF</h2>
            <p class="text-xl text-slate-400 font-light">Versión Alpha</p>
        </div>
        
        <div class="flex flex-col gap-4 w-full max-w-sm">
			<input type="email" id="email-acceso" 
				   placeholder="tu-cuenta@gmail.com" 
				   autocomplete="email"
				   class="px-4 py-4 rounded-xl bg-slate-800 text-white border-2 border-slate-700 focus:border-sky-500 outline-none transition-all text-lg text-center shadow-inner">

			<div id="aviso-autocompletar" class="hidden text-[10px] text-emerald-400 font-bold mt-2 animate-pulse text-center">
				¡Excelente! Cuenta vinculada 🛡️
			</div>    
            <button onclick="solicitarAccesoMágico()" id="btn-acceso" 
			class="group relative bg-slate-950 text-white px-10 py-6 rounded-2xl font-black 
				   tracking-tight text-2xl flex items-center justify-center gap-5
				   border-2 border-sky-900 overflow-hidden transition-all duration-300
				   active:scale-95 animate-pulso-3s">
			
			<div class="absolute inset-0 w-1/2 h-full bg-gradient-to-r from-transparent via-white/30 to-transparent 
						-skew-x-12 animate-rayo-3s pointer-events-none z-10"></div>

			<div class="bg-white p-3 rounded-full shadow-lg relative z-20 scale-110">
				<svg class="w-7 h-7" viewBox="0 0 48 48">
					<path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path>
					<path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path>
					<path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path>
					<path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571l6.19,5.238C40.486,35.33,44,30.078,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
				</svg>
			</div>

			<span class="tracking-wider text-xl font-extrabold relative z-20">Ingresá con Google</span>
		</button>
            
            <div id="aviso-mail" class="hidden mt-8 p-6 bg-slate-900/90 border border-sky-500/30 rounded-3xl text-center shadow-2xl animate-fade-in backdrop-blur-sm">
				<p class="text-sky-100 text-lg mb-6 font-semibold tracking-tight">
					📧 ¡Enviado! Revisá tu correo para entrar.
				</p>

				<p class="text-[10px] text-sky-400 uppercase tracking-[0.2em] mb-4 font-black opacity-70">
					ENTRÁ POR GMAIL 
				</p>

				<div class="flex justify-center">
					<button onclick="abrirGmailInteligente()" 
						class="relative w-28 h-28 group transition-all duration-300 active:scale-90">
						
						<div class="absolute inset-0 bg-sky-500/20 rounded-2xl blur-xl group-hover:bg-sky-500/40 transition-all"></div>
						
						<img src="img/gmail.webp" 
							 alt="Gmail" 
							 class="relative w-full h-full object-cover rounded-2xl border border-white/10 shadow-2xl transition-transform group-hover:rotate-2">
						
						<div class="absolute inset-0 rounded-2xl bg-gradient-to-tr from-transparent via-white/10 to-transparent pointer-events-none"></div>
					</button>
				</div>
				
				<p class="mt-4 text-xs text-slate-500 font-medium"> ☝ Abrí la App 👆</p>
			</div>
        </div>
    </div>

    <!-- Sección Catálogo -->
    <div id="seccion-catalogo" class="hidden opacity-0 transition-opacity duration-500 p-8">
        <div class="fixed top-4 right-4 bg-sky-600 px-4 py-2 rounded-full font-bold shadow-2xl z-50 border border-sky-400 text-white">
            💰 Pesos JyF: <span id="saldo">0</span>
        </div>
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-sky-400">Tienda JyF</h1>
            <p class="text-slate-400">Comprátelo ya 🤩 • Ganá Pesos JyF 💸 • Llevátelo todo 🎁</p>
        </header>
        <div id="grilla" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Modal Personalizado -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[10000] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold text-white mb-4"></h3>
            <p id="modal-text" class="text-slate-300 mb-8"></p>
            <div id="modal-actions" class="flex gap-4 justify-end">
                <button id="modal-cancel" class="px-6 py-2 rounded-full font-bold text-slate-400 hover:text-white transition">Cancelar</button>
                <button id="modal-confirm" class="px-6 py-2 rounded-full font-bold bg-sky-600 text-white hover:bg-sky-500 transition">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Registro (Caso C) -->
    <div id="modal-registro" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[11000] flex items-center justify-center p-4">
        <div class="bg-slate-900 border-2 border-sky-500 p-8 rounded-3xl max-w-md w-full shadow-[0_0_50px_rgba(14,165,233,0.3)]">
            <h3 class="text-3xl font-bold text-white mb-2">¡Bienvenido! 🎁</h3>
            <p class="text-sky-300 mb-8">Completá tus datos para recibir tus <span class="font-bold text-white">500 Pesos JyF</span> de regalo.</p>
            
            <div class="flex flex-col gap-4">
                <input type="text" id="reg-nombre" placeholder="Tu Nombre" 
                       class="px-4 py-4 rounded-xl bg-slate-800 text-white border border-slate-700 focus:border-sky-500 outline-none transition-all">
                <input type="tel" id="reg-whatsapp" placeholder="Tu WhatsApp (con código de área)" 
                       class="px-4 py-4 rounded-xl bg-slate-800 text-white border border-slate-700 focus:border-sky-500 outline-none transition-all">
                
                <button onclick="procesarRegistroFinal()" 
                        class="mt-4 bg-white text-black py-4 rounded-xl font-bold hover:bg-sky-100 transition shadow-xl active:scale-95">
                    Activar mi Cuenta 🚀
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
