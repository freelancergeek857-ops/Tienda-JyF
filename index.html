<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda JyF - versión Alpha</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body onload="revelarCuerpo()">

    <div id="pantalla-carga">
        <img id="img-homenaje" src="img/Tienda_JyF.intro.webp" class="w-[80%] md:w-[40%] h-auto rounded-[15px] overflow-hidden" alt="Homenaje Tienda JyF">
    </div>

    <div id="seccion-login" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center seccion">
        <div class="mb-8">
            <h2 class="text-5xl font-bold text-white mb-2">Tienda JyF</h2>
            <p class="text-xl text-slate-400">Ingresá con tu cuenta de Google (Email)</p>
        </div>
        
        <div class="flex flex-col gap-4 w-full max-w-sm">
            <input type="email" id="email-acceso" placeholder="tu-cuenta@gmail.com" 
                   class="px-4 py-4 rounded-xl bg-slate-800 text-white border-2 border-slate-700 focus:border-sky-500 outline-none transition-all text-lg text-center">
            
            <button onclick="solicitarAccesoMágico()" id="btn-acceso" 
                    class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-sky-100 transition-all shadow-xl active:scale-95">
                Pedir Llave Mágica ✨
            </button>
            
            <div id="aviso-mail" class="hidden mt-4 p-4 bg-sky-900/30 border border-sky-500 rounded-lg text-sky-200 text-sm">
                📧 ¡Enviado! Buscá el mail de acceso en tu bandeja de entrada y hacé clic en el link desde este dispositivo.
                <br><br>
                <a href="https://mail.google.com" target="_blank" class="underline font-bold text-white text-lg">Abrir Gmail ↗</a>
            </div>
        </div>

        <p class="mt-8 text-slate-600 text-sm">🔒 Acceso único por dispositivo</p>
    </div>

    <div id="seccion-catalogo" class="hidden p-8 seccion">
        <div class="fixed top-4 right-4 bg-sky-600 px-4 py-2 rounded-full font-bold shadow-2xl z-50 border border-sky-400">
            💰 Pesos JyF: <span id="saldo">0</span>
        </div>
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-sky-400">Tienda JyF</h1>
            <p class="text-slate-400">Comprá lo que te encanta 🤩 • Ganá Pesos JyF 💸</p>
        </header>
        <div id="grilla" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
