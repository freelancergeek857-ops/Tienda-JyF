<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda JyF - Búnker Alpha</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #38bdf8; }
        
        /* Animación de brillo para el logo */
        .brillo-logo { filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.8)); }
        @keyframes latido {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        .animar-logo { animation: latido 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <div id="pantalla-carga" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#0f172a]">
        <div class="brillo-logo animar-logo mb-6 text-7xl">💎</div>
        <h1 class="text-4xl font-bold text-sky-400">Tienda JyF</h1>
        <p class="text-slate-500 italic mt-4 animate-pulse">Sincronizando con el búnker de Leo...</p>
    </div>

    <div id="seccion-login" class="hidden min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-8">
            <h2 class="text-5xl font-bold text-white mb-2">Bienvenido</h2>
            <p class="text-xl text-slate-400">Tu puerta de acceso a los Pesos JyF</p>
        </div>
        
        <button onclick="simularIngreso()" class="flex items-center gap-4 bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-sky-100 transition-all shadow-xl hover:scale-105">
            <img src="https://www.google.com/favicon.ico" class="w-6">
            Ingresar con Google
        </button>
        <p class="mt-6 text-slate-600 text-sm">🔒 Conexión segura y encriptada</p>
    </div>

    <div id="seccion-catalogo" class="hidden p-8">
        <div class="fixed top-4 right-4 bg-sky-600 px-4 py-2 rounded-full font-bold shadow-2xl z-50 border border-sky-400">
            💰 Pesos JyF: <span id="saldo">0</span>
        </div>

        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold text-sky-400">Tienda JyF</h1>
            <p class="text-slate-400">Comprá lo que te encanta 🤩 • Ganá Pesos JyF 💸</p>
            <p class="text-slate-600 font-bold mt-2">VERSIÓN DEVELOPMENT</p>
        </header>

        <div id="grilla" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        // VARIABLES GLOBALES
        let totalPesosJyF = 0;
        const URL_DB = 'https://itkuzqbjofryhatachyz.supabase.co';
        const KEY_DB = 'sb_publishable_FYhPcYO61lzuv-Y2P9LmaQ_miOQ2cVH';
        const client = supabase.createClient(URL_DB, KEY_DB);
		
		// La imagen que querés usar de Placeholder
		const IMG_PLACEHOLDER = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQx5RMPoanaRwX5s3ytHXNmVHD-QKcyR_5Aeg&s";

        // 1. CONTROL DE NAVEGACIÓN (SPA)
        window.onload = () => {
            // Simulamos tiempo de carga de archivos y conexión
            setTimeout(() => {
                document.getElementById('pantalla-carga').classList.add('hidden');
                document.getElementById('seccion-login').classList.remove('hidden');
            }, 3000);
        };

        function simularIngreso() {
            const btn = event.currentTarget;
            btn.innerHTML = `Verificando Hardware ID...`;
            btn.classList.add('opacity-50', 'pointer-events-none');

            setTimeout(() => {
                document.getElementById('seccion-login').classList.add('hidden');
                document.getElementById('seccion-catalogo').classList.remove('hidden');
                cargarProductos(); // Cargamos la data real de Supabase una vez "adentro"
            }, 2000);
        }

        // 2. LÓGICA DE COMPRA (Tu código original)
        function simularCompra(nombre, precio, regalo) {
            const confirmar = confirm(`¿Confirmás la compra de ${nombre} por $${precio}?`);
            if (confirmar) {
                let usaPuntos = false;
                if (totalPesosJyF > 0) {
                    usaPuntos = confirm(`Tenés ${totalPesosJyF} Pesos JyF. ¿Querés usarlos?`);
                }

                if (usaPuntos) {
                    if (totalPesosJyF >= precio) {
                        totalPesosJyF -= precio;
                        alert(`¡Pagado totalmente con puntos!`);
                    } else {
                        const resto = precio - totalPesosJyF;
                        totalPesosJyF = 0;
                        alert(`Usaste tus puntos. Pagás $${resto} en ARS.`);
                    }
                } else {
                    totalPesosJyF += regalo;
                    alert(`¡Compra realizada! Sumaste ${regalo} Pesos JyF.`);
                }
                document.getElementById('saldo').innerText = totalPesosJyF;
            }
        }

function preCargarGrillaVacia() {
        const grilla = document.getElementById('grilla');
        let placeholders = "";
        for (let i = 0; i < 4; i++) {
            placeholders += `
                <div class="card rounded-xl overflow-hidden p-4 shadow-lg flex flex-col h-full animate-pulse">
                    <img src="${IMG_PLACEHOLDER}" class="w-full h-48 object-cover rounded-lg mb-4 opacity-50">
                    <div class="h-6 bg-slate-700 rounded w-3/4 mb-4"></div>
                    <div class="h-10 bg-slate-700 rounded mb-2"></div>
                    <div class="h-10 bg-slate-700 rounded"></div>
                </div>`;
        }
        grilla.innerHTML = placeholders;
    }

		// 3. CARGA DE PRODUCTOS (Modificada para suavizar la transición)
		async function cargarProductos() {
			const { data, error } = await client.from('productos').select('*');
			if (error) {
				console.error('Error:', error);
				return;
			}

			const grilla = document.getElementById('grilla');
			
			// Reemplazamos los placeholders por la data real
			grilla.innerHTML = data.map(p => {
				const mensaje = encodeURIComponent(`¡Hola! Me interesa ${p.nombre}...`);
				const linkWS = `https://wa.me/+5492216567905?text=${mensaje}`;
				
				return `
				<div class="card rounded-xl overflow-hidden p-4 shadow-lg flex flex-col h-full">
					<img src="${p.imagen_url}" 
						 class="w-full h-48 object-cover rounded-lg mb-4" 
						 onerror="this.src='${IMG_PLACEHOLDER}'"
						 loading="lazy">
					
					<h2 class="text-lg font-semibold mb-2 flex-grow">${p.nombre}</h2>
					<div class="flex justify-between items-center mb-4">
						<span class="text-2xl font-bold">$${p.precio_venta}</span>
					</div>
					<a href="${linkWS}" target="_blank" class="bg-green-600 text-center py-2 rounded-lg mb-2 font-bold hover:bg-green-500 transition">WhatsApp 📱</a>
					<button onclick="simularCompra('${p.nombre}', ${p.precio_venta}, ${p.pesos_jsf_regalo})" class="bg-sky-600 py-2 rounded-lg font-bold hover:bg-sky-500 transition">Comprar Directo 🛒</button>
					<div class="bg-sky-500/10 border border-sky-500/50 rounded-lg p-2 text-center mt-4">
						<span class="text-sky-400 font-bold text-xs">🎁 +${p.pesos_jsf_regalo} Pesos JyF</span>
					</div>
				</div>`;
			}).join('');
		}
    </script>
</body>
</html>
